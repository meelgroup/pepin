name: build

on:
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, macos-15, ubuntu-24.04-arm, macos-15-intel, windows-latest]
        build_type: [Release]
        staticcompile: [ON, OFF]

    steps:
    - name: Set up MSYS2
      if: contains(matrix.os, 'windows')
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          make
          mingw-w64-x86_64-gmp
          mingw-w64-x86_64-zlib

    - name: Install dependencies for Linux
      if: contains(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -yq help2man libgmp-dev

    - name: Install gmp for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        tar xf gmp-6.3.0.tar.xz
        cd gmp-6.3.0
        ./configure --enable-static -enable-cxx --enable-shared --with-pic
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac dynamic
      if: contains(matrix.os, 'macos') && matrix.staticcompile == 'OFF'
      run: |
        wget https://www.zlib.net/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac static
      if: contains(matrix.os, 'macos') && matrix.staticcompile == 'ON'
      run: |
        wget https://www.zlib.net/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure --static
        make -j8
        sudo make install
        cd ..

    - name: checkout
      uses: actions/checkout@v4
      with:
        path: project
        submodules: 'true'

    - name: Configure & build (Windows)
      if: contains(matrix.os, 'windows')
      shell: msys2 {0}
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DSTATICCOMPILE=${{ matrix.staticcompile }} \
        -G Ninja \
        -S ..
        cmake --build . --config ${{matrix.build_type}} -v

    - name: Configure & build (non-Windows)
      if: "!contains(matrix.os, 'windows')"
      shell: bash
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DSTATICCOMPILE=${{ matrix.staticcompile }} \
        -S ..
        cmake --build . --config ${{matrix.build_type}} -v

    - name: Test
      if: "!contains(matrix.os, 'windows')"
      run: ctest -C ${{matrix.build_type}} --verbose

    - name: Upload Artifact - Linux
      if: contains(matrix.os, 'ubuntu') && matrix.staticcompile == 'ON' && !contains(matrix.os, 'arm')
      uses: actions/upload-artifact@v4
      with:
        name: pepin-linux-amd64
        path: |
          project/build/pepin
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Linux arm
      if: contains(matrix.os, 'ubuntu') && matrix.staticcompile == 'ON' && contains(matrix.os, 'arm')
      uses: actions/upload-artifact@v4
      with:
        name: pepin-linux-arm64
        path: |
          project/build/pepin
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Mac ARM64
      if: matrix.os == 'macos-15' && matrix.staticcompile == 'ON'
      uses: actions/upload-artifact@v4
      with:
        name: pepin-mac-arm64
        path: |
          project/build/pepin
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Mac x86_64
      if: matrix.os == 'macos-15-intel' && matrix.staticcompile == 'ON'
      uses: actions/upload-artifact@v4
      with:
        name: pepin-mac-x86_64
        path: |
          project/build/pepin
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Windows
      if: matrix.os == 'windows-latest' && matrix.staticcompile == 'ON'
      uses: actions/upload-artifact@v4
      with:
        name: pepin-windows-x86_64
        path: |
          project/build/pepin.exe
